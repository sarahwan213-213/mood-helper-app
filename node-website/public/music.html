          <div>

          </div>
          <span style="margin-left:auto;color:var(--text-muted);">→</span>
        </a>

          <span style="font-size:2rem;">😢</span>
          <div>
            <div style="font-weight:700;color:var(--sad-text);">Sad</div>
            <div style="font-size:0.82rem;color:var(--text-muted);">9 comfort tracks to soothe</div>
          </div>
          <span style="margin-left:auto;color:var(--text-muted);">→</span>
        </a>
        <a href="/music-happy.html" class="card" style="display:flex;align-items:center;gap:1rem;padding:1.25rem;border-color:rgba(245,158,11,0.2);background:linear-gradient(135deg,rgba(245,158,11,0.06),rgba(249,115,22,0.06));text-decoration:none;">
          <span style="font-size:2rem;">😄</span>
          <div>
            <div style="font-weight:700;color:var(--happy-text);">Happy</div>

  <script>
    function play(src) {
      const audio = new Audio(src);
      audio.play().catch(() => {
        showToast("⚠️ Could not play file. Check it exists in /music/");
      });
    }
    function showToast(msg) {
      let t = document.getElementById('_toast');
      if (!t) {
        t = document.createElement('div');
        t.id = '_toast';
        t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#2d4a3e;color:#fff;padding:0.7rem 1.4rem;border-radius:99px;font-weight:700;font-size:0.9rem;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;';
        document.body.appendChild(t);
      }
      t.textContent = msg; t.style.opacity = '1';
      clearTimeout(t._t); t._t = setTimeout(() => { t.style.opacity = '0'; }, 2500);
    }
  </script>
</body>
</html>
