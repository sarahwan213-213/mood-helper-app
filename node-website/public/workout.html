<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-emerald-50 to-teal-100 min-h-screen">

  <div class="max-w-md mx-auto pt-12 px-6">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold text-emerald-700">🏃 Workout</h1>
      <p class="text-emerald-600 mt-2">Move your body and release energy</p>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-8 space-y-6">
      <div class="aspect-video bg-black rounded-2xl overflow-hidden">
        <video id="workoutVideo" controls class="w-full h-full">
          <source src="/workout/workout1.mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
      </div>

      <p class="text-center text-sm text-gray-500">Choose a short workout video</p>

      <!-- You can add more videos later -->
      <button onclick="document.getElementById('workoutVideo').play()" 
              class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl font-medium">
        ▶️ Start Workout Video
      </button>
    </div>

    <div class="text-center mt-10">
      <a href="/mood.html" class="text-emerald-600 hover:underline">← Back to Mood Detection</a>
    </div>
  </div>
</body>
</html>
