<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calm - Mood Helper</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #f0f4e8 0%, #e0e8d8 50%, #d0e0c8 100%);
      position: relative;
      overflow: hidden;
    }
    .illustration { position: absolute; opacity: 0.16; pointer-events: none; z-index: 0; animation: float 26s infinite linear; }
  </style>
</head>
<body class="min-h-screen">

  <div class="illustration text-7xl" style="top: 22%; left: 12%;">🌿</div>
  <div class="illustration text-6xl" style="top: 48%; right: 18%;">🍃</div>

  <div class="max-w-md mx-auto pt-12 px-6 relative z-10">
    <h1 class="text-4xl font-bold text-[#4a6b5a] text-center">You're feeling Calm</h1>
    <p class="text-center text-[#6a8a7a] mt-3">A perfect moment to maintain balance and peace</p>

    <div class="mt-10 space-y-4">
      <button onclick="goTo('/meditation-calm.html')" class="w-full py-6 bg-[#b8d0c0] hover:bg-[#a7c0b0] text-white font-medium rounded-3xl text-lg shadow">🧘 Meditation for Calm</button>
      <button onclick="goTo('/music-calm.html')" class="w-full py-6 bg-[#b8d0c0] hover:bg-[#a7c0b0] text-white font-medium rounded-3xl text-lg shadow">🎵 Play Music for Calm</button>
      <button onclick="goTo('/workout-calm.html')" class="w-full py-6 bg-[#b8d0c0] hover:bg-[#a7c0b0] text-white font-medium rounded-3xl text-lg shadow">🏃 Gentle Movement for Calm</button>
    </div>

    <div class="mt-12 bg-white rounded-3xl shadow p-6">
      <p class="text-center text-[#4a6b5a] font-medium mb-4">Would you like to save this moment?</p>
      <input id="note-input" type="text" placeholder="e.g. feeling peaceful after reading" 
             class="w-full px-5 py-4 bg-[#f0f4e8] border border-[#b8d0c0] rounded-2xl focus:outline-none text-gray-700 mb-4">
      <button onclick="saveToJournal()" class="w-full py-4 bg-[#a8c4b0] hover:bg-[#95b39d] text-white font-medium rounded-2xl transition">
        💾 Save to Mood Journal
      </button>
    </div>

    <div class="text-center mt-12">
      <a href="/mood.html" class="inline-flex items-center gap-2 text-[#6a8a7a] hover:text-[#4a6b5a] font-medium">
        ← Back to Mood Detection
      </a>
    </div>
  </div>

  <script>
    function goTo(page) { window.location.href = page; }
    function saveToJournal() {
      const note = document.getElementById('note-input').value.trim() || "";
      const mood = "Calm";
      const entry = { date: new Date().toISOString().split('T')[0], mood: mood, note: note, tag: "" };
      let journal = JSON.parse(localStorage.getItem('moodJournal')) || [];
      journal.unshift(entry);
      localStorage.setItem('moodJournal', JSON.stringify(journal));
      alert("✅ Saved to Mood Journal!");
      document.getElementById('note-input').value = "";
    }
  </script>
</body>
</html>
