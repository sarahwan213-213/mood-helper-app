<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mood Quiz • Mood Helper</title>
  <link rel="stylesheet" href="/shared.css">
  <script>
    function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); localStorage.setItem('darkMode', t==='dark'?'true':'false'); }
    (function(){ var s=localStorage.getItem('darkMode'); applyTheme(s!==null?(s==='true'?'dark':'light'):(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light')); })();
  </script>
  <style>
    .page-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky; top: 0; z-index: 50;
    }
    .progress-bar-wrap {
      background: var(--border);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      margin: 1.25rem 0 0.5rem;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #7C3AED, #A855F7);
      transition: width 0.4s ease;
    }
    .question-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 1.75rem 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow-sm);
      border: 1.5px solid var(--border);
    }
    .q-number {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 0.6rem;
    }
    .q-text {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.45;
      margin-bottom: 1.25rem;
    }
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }
    .opt-btn {
      padding: 0.75rem 0.5rem;
      border-radius: 14px;
      border: 2px solid var(--border);
      background: var(--surface2);
      color: var(--text-soft);
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
      line-height: 1.3;
    }
    .opt-btn:hover { border-color: var(--primary); color: var(--primary); background: #f5f0ff; transform: translateY(-1px); }
    .opt-btn.selected { border-color: var(--primary); background: linear-gradient(135deg,#7C3AED,#A855F7); color: #fff; }
    [data-theme="dark"] .opt-btn:hover { background: #2d1f5e; }
    [data-theme="dark"] .opt-btn.selected { background: linear-gradient(135deg,#7C3AED,#A855F7); }

    .nav-btns { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
    .nav-btns .btn { flex: 1; justify-content: center; }

    /* Result screen */
    .result-screen { display: none; text-align: center; }
    .result-emoji { font-size: 4rem; margin-bottom: 0.5rem; }
    .result-score {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(135deg, #7C3AED, #A855F7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-label {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text);
      margin: 0.25rem 0 1rem;
    }
    .result-desc {
      font-size: 0.9rem;
      color: var(--text-soft);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .result-tips {
      background: var(--surface2);
      border-radius: 16px;
      padding: 1.1rem 1.25rem;
      text-align: left;
      margin-bottom: 1.25rem;
    }
    .result-tips h4 { font-size: 0.8rem; font-weight: 800; letter-spacing:.08em; text-transform:uppercase; color: var(--primary); margin-bottom: 0.6rem; }
    .result-tips li { font-size: 0.85rem; color: var(--text-soft); margin-bottom: 0.4rem; list-style: none; padding-left: 1.2rem; position: relative; }
    .result-tips li::before { content: "✦"; position: absolute; left: 0; color: var(--primary); font-size: 0.7rem; top: 2px; }
  </style>
</head>
<body class="with-bottom-nav">

  <div class="page-header">
    <a href="/mood.html" class="back-btn">Back</a>
    <h1 style="font-size:1.2rem;font-weight:800;color:var(--text);">🧠 Mood Quiz</h1>
  </div>

  <div class="page-content" style="padding:1.25rem 0 5rem;">
    <div class="container">

      <!-- Quiz Screen -->
      <div id="quiz-screen">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.25rem;">
          <span style="font-size:0.8rem;font-weight:700;color:var(--text-muted);">Question <span id="q-current">1</span> of <span id="q-total"></span></span>
          <span style="font-size:0.8rem;font-weight:700;color:var(--primary);" id="q-percent">0%</span>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>

        <div class="question-card fade-up">
          <div class="q-number" id="q-label">Question 1</div>
          <div class="q-text" id="q-text"></div>
          <div class="options-grid" id="q-options"></div>
        </div>

        <div class="nav-btns">
          <button class="btn btn-surface" id="btn-prev" onclick="prevQ()" style="display:none;">← Back</button>
          <button class="btn" id="btn-next" onclick="nextQ()">Next →</button>
        </div>
      </div>

      <!-- Result Screen -->
      <div id="result-screen" class="result-screen fade-up">
        <div class="card" style="padding:2rem 1.5rem;">
          <div class="result-emoji" id="res-emoji"></div>
          <div class="result-score" id="res-score"></div>
          <div class="result-label" id="res-label"></div>
          <div class="result-desc" id="res-desc"></div>
          <div class="result-tips">
            <h4>Recommended for you</h4>
            <ul id="res-tips"></ul>
          </div>
          <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
            <button onclick="restartQuiz()" class="btn btn-surface" style="flex:1;">🔄 Retake Quiz</button>
            <a href="/mood.html" class="btn" style="flex:1;justify-content:center;">🏠 Home</a>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="/mood.html"      class="bottom-nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
    <a href="/journal.html"   class="bottom-nav-item"><span class="nav-icon">📔</span><span>Journal</span></a>
    <a href="/dashboard.html" class="bottom-nav-item"><span class="nav-icon">📊</span><span>Stats</span></a>
    <a href="/streak.html"    class="bottom-nav-item"><span class="nav-icon">🔥</span><span>Streak</span></a>
  </nav>

  <script>
    const questions = [
      {
        text: "How would you describe your energy level today?",
        options: [
          { label: "😴 Very low — exhausted", score: 0 },
          { label: "😐 Low — tired", score: 1 },
          { label: "🙂 Okay — manageable", score: 2 },
          { label: "⚡ High — energised", score: 3 }
        ]
      },
      {
        text: "How well did you sleep last night?",
        options: [
          { label: "😫 Barely slept", score: 0 },
          { label: "😕 Restless", score: 1 },
          { label: "😌 Decent sleep", score: 2 },
          { label: "😴 Slept great", score: 3 }
        ]
      },
      {
        text: "How connected do you feel to people around you?",
        options: [
          { label: "🙈 Very alone", score: 0 },
          { label: "😶 A bit isolated", score: 1 },
          { label: "🤝 Somewhat connected", score: 2 },
          { label: "💛 Very connected", score: 3 }
        ]
      },
      {
        text: "How stressed or anxious have you felt today?",
        options: [
          { label: "😰 Overwhelmed", score: 0 },
          { label: "😬 Quite stressed", score: 1 },
          { label: "😐 A little tense", score: 2 },
          { label: "😊 Calm & relaxed", score: 3 }
        ]
      },
      {
        text: "How motivated do you feel to do things you enjoy?",
        options: [
          { label: "💀 Zero motivation", score: 0 },
          { label: "😑 Hard to start", score: 1 },
          { label: "🙂 Some motivation", score: 2 },
          { label: "🚀 Fully motivated", score: 3 }
        ]
      },
      {
        text: "How positive or hopeful do you feel about tomorrow?",
        options: [
          { label: "😞 Not at all", score: 0 },
          { label: "😕 Not very hopeful", score: 1 },
          { label: "🙂 Somewhat hopeful", score: 2 },
          { label: "🌟 Very optimistic", score: 3 }
        ]
      }
    ];

    const results = [
      {
        min: 0, max: 5,
        emoji: "💜", label: "You need some care",
        desc: "Your well-being score suggests you're going through a tough time. That's okay — everyone has hard days. Try to be gentle with yourself and reach out if you need support.",
        tips: ["Try a short guided meditation", "Listen to calming music", "Write your feelings in the journal", "Consider talking to someone you trust"]
      },
      {
        min: 6, max: 10,
        emoji: "💛", label: "Room to grow",
        desc: "You're managing, but your energy and mood could use a boost. Small positive habits can make a big difference over time.",
        tips: ["A short walk or light workout", "Try a breathing exercise", "Connect with a friend today", "Write down 3 things you're grateful for"]
      },
      {
        min: 11, max: 15,
        emoji: "💚", label: "Doing well!",
        desc: "Your well-being is in a good place! You're coping effectively and feeling fairly balanced. Keep it up!",
        tips: ["Keep your daily streak going 🔥", "Explore a new workout routine", "Help someone else — it boosts your mood too", "Celebrate your progress!"]
      },
      {
        min: 16, max: 18,
        emoji: "🌟", label: "Thriving!",
        desc: "You're in excellent mental shape right now — energised, connected, and positive. This is a great time to build on your momentum.",
        tips: ["Share your positivity with others", "Try something new and challenging", "Journal your wins to remember this feeling", "Keep the streak alive!"]
      }
    ];

    let current = 0;
    let answers = new Array(questions.length).fill(null);

    function init() {
      document.getElementById('q-total').textContent = questions.length;
      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[current];
      document.getElementById('q-label').textContent = `Question ${current + 1}`;
      document.getElementById('q-current').textContent = current + 1;
      document.getElementById('q-text').textContent = q.text;

      const pct = Math.round((current / questions.length) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('q-percent').textContent = pct + '%';

      const optContainer = document.getElementById('q-options');
      optContainer.innerHTML = '';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn' + (answers[current] === i ? ' selected' : '');
        btn.textContent = opt.label;
        btn.onclick = () => selectOption(i);
        optContainer.appendChild(btn);
      });

      document.getElementById('btn-prev').style.display = current > 0 ? 'block' : 'none';
      document.getElementById('btn-next').textContent = current === questions.length - 1 ? 'See Results 🎯' : 'Next →';
    }

    function selectOption(i) {
      answers[current] = i;
      document.querySelectorAll('.opt-btn').forEach((btn, idx) => {
        btn.classList.toggle('selected', idx === i);
      });
    }

    function nextQ() {
      if (answers[current] === null) {
        document.getElementById('q-options').style.animation = 'none';
        document.getElementById('q-options').offsetHeight;
        document.getElementById('q-options').style.animation = 'shake 0.3s ease';
        return;
      }
      if (current < questions.length - 1) {
        current++;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function prevQ() {
      if (current > 0) { current--; renderQuestion(); }
    }

    function showResult() {
      const totalScore = answers.reduce((sum, ansIdx, qi) => {
        return sum + (ansIdx !== null ? questions[qi].options[ansIdx].score : 0);
      }, 0);

      const result = results.find(r => totalScore >= r.min && totalScore <= r.max);

      document.getElementById('quiz-screen').style.display = 'none';
      const rs = document.getElementById('result-screen');
      rs.style.display = 'block';

      document.getElementById('res-emoji').textContent = result.emoji;
      document.getElementById('res-score').textContent = `${totalScore} / 18`;
      document.getElementById('res-label').textContent = result.label;
      document.getElementById('res-desc').textContent = result.desc;

      const tipsEl = document.getElementById('res-tips');
      tipsEl.innerHTML = result.tips.map(t => `<li>${t}</li>`).join('');

      // Update progress bar to 100%
      document.getElementById('progress-fill').style.width = '100%';
      document.getElementById('q-percent').textContent = '100%';

      // Save quiz result to localStorage
      const entry = { date: new Date().toISOString().split('T')[0], score: totalScore, label: result.label };
      const history = JSON.parse(localStorage.getItem('quizHistory') || '[]');
      history.unshift(entry);
      localStorage.setItem('quizHistory', JSON.stringify(history));
    }

    function restartQuiz() {
      current = 0;
      answers = new Array(questions.length).fill(null);
      document.getElementById('quiz-screen').style.display = 'block';
      document.getElementById('result-screen').style.display = 'none';
      renderQuestion();
    }

    init();
  </script>
</body>
</html>
