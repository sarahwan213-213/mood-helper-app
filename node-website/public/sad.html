<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sad - Mood Helper</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #f0e8f0 0%, #e8d8e8 50%, #d8c8e0 100%);
      position: relative;
      overflow: hidden;
    }
    .illustration { position: absolute; opacity: 0.17; pointer-events: none; z-index: 0; animation: float 32s infinite linear; }
  </style>
</head>
<body class="min-h-screen">

  <div class="illustration text-7xl" style="top: 25%; left: 15%;">🌙</div>
  <div class="illustration text-5xl" style="top: 55%; right: 20%;">🌸</div>

  <div class="max-w-md mx-auto pt-12 px-6 relative z-10">
    <h1 class="text-4xl font-bold text-[#6a5c7a] text-center">You're feeling Sad</h1>
    <p class="text-center text-[#8a7a94] mt-3">It's okay. Let's be gentle with yourself.</p>

    <div class="mt-10 space-y-4">
      <button onclick="goTo('/meditation-sad.html')" class="w-full py-6 bg-[#b8a8c0] hover:bg-[#a896b0] text-white font-medium rounded-3xl text-lg shadow">🧘 Meditation for Sad</button>
      <button onclick="goTo('/music-sad.html')" class="w-full py-6 bg-[#b8a8c0] hover:bg-[#a896b0] text-white font-medium rounded-3xl text-lg shadow">🎵 Play Music for Sad</button>
      <button onclick="goTo('/workout-sad.html')" class="w-full py-6 bg-[#b8a8c0] hover:bg-[#a896b0] text-white font-medium rounded-3xl text-lg shadow">🏃 Gentle Movement for Sad</button>
    </div>

    <div class="mt-12 bg-white rounded-3xl shadow p-6">
      <p class="text-center text-[#5d4a5f] font-medium mb-4">Would you like to save this moment?</p>
      <input id="note-input" type="text" placeholder="e.g. felt tired after exams" 
             class="w-full px-5 py-4 bg-[#f0e8f0] border border-[#d8c8e0] rounded-2xl focus:outline-none text-gray-700 mb-4">
      <button onclick="saveToJournal()" class="w-full py-4 bg-[#b8a8c0] hover:bg-[#a896b0] text-white font-medium rounded-2xl transition">
        💾 Save to Mood Journal
      </button>
    </div>

    <div class="text-center mt-12">
      <a href="/mood.html" class="inline-flex items-center gap-2 text-[#8a7a94] hover:text-[#6a5c7a] font-medium">
        ← Back to Mood Detection
      </a>
    </div>
  </div>

  <script>
    function goTo(page) { window.location.href = page; }
    function saveToJournal() {
      const note = document.getElementById('note-input').value.trim() || "";
      const mood = "Sad";
      const entry = { date: new Date().toISOString().split('T')[0], mood: mood, note: note, tag: "" };
      let journal = JSON.parse(localStorage.getItem('moodJournal')) || [];
      journal.unshift(entry);
      localStorage.setItem('moodJournal', JSON.stringify(journal));
      alert("✅ Saved to Mood Journal!");
      document.getElementById('note-input').value = "";
    }
  </script>
</body>
</html>
