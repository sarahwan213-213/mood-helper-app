<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meditation for Angry • Mood Helper</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    .mood-header { background: linear-gradient(135deg,#FF4D4D,#FF7043); padding:1.5rem 1.25rem 1.25rem; }
    .track-play-btn { background: linear-gradient(135deg,#FF4D4D,#FF7043); color:#fff; }
    .track-subtitle { color: #B91C1C; }
    .progress-fill   { background: linear-gradient(90deg,#FF4D4D,#FF7043); }
    .pause-btn { background: linear-gradient(135deg,#FF4D4D,#FF7043); color:#fff; border:none; flex:1; padding:0.85rem; border-radius:14px; font-weight:700; cursor:pointer; font-size:1rem; }
    .stop-btn  { background:rgba(239,68,68,0.12); color:#DC2626; border:1.5px solid rgba(239,68,68,0.25); flex:1; padding:0.85rem; border-radius:14px; font-weight:700; cursor:pointer; font-size:1rem; }
  </style>
</head>
<body class="with-bottom-nav">

  <div class="mood-header">
    <a href="/angry.html" class="back-btn" style="color:rgba(255,255,255,0.85);margin-bottom:0.75rem;display:inline-flex;">Back to Angry</a>
    <h1 style="font-size:1.5rem;font-weight:900;color:#fff;margin-bottom:0.2rem;">🧘 Meditation for Angry</h1>
    <p style="color:rgba(255,255,255,0.8);font-size:0.88rem;">Only one track can play at a time</p>
  </div>

  <div class="page-content" style="padding:1.5rem 0 4rem;">
    <div class="container-sm">

      <div style="display:flex;flex-direction:column;gap:0.75rem;">

        <div class="track-card fade-up" id="card-0">
          <button class="track-play-btn" onclick="playMusic(this, 'https://d1cy5zxxhbcbkk.cloudfront.net/guided-meditations/04_Meditation_for_Working_with_Difficulties.mp3', 'Working with Difficulties', 0)">▶</button>
          <div class="track-info">
            <div class="track-title">Working with Difficulties</div>
            <div class="track-subtitle">Guided Meditation • 8–10 minutes</div>
          </div>
        </div>

        <div class="track-card fade-up-1" id="card-1">
          <button class="track-play-btn" onclick="playMusic(this, 'http://traffic.libsyn.com/tarabrach/2017-01-11-Meditating-with-RAIN-TaraBrach.mp3', 'Meditating with RAIN', 1)">▶</button>
          <div class="track-info">
            <div class="track-title">Meditating with RAIN</div>
            <div class="track-subtitle">Guided Meditation • 12 minutes</div>
          </div>
        </div>

        <div class="track-card fade-up-2" id="card-2">
          <button class="track-play-btn" onclick="playMusic(this, 'https://self-compassion.org/wp-content/uploads/2024/07/Soften-soothe-allow-Working-with-difficult-emotions-March2024.mp3', 'Soften, Soothe, Allow', 2)">▶</button>
          <div class="track-info">
            <div class="track-title">Soften, Soothe, Allow</div>
            <div class="track-subtitle">Guided Meditation • 10 minutes</div>
          </div>
        </div>

      </div>

      <!-- Player Bar -->
      <div id="player-container" class="player-bar hidden" style="margin-top:1.5rem;">
        <div id="now-playing" style="font-weight:700;color:var(--text);margin-bottom:0.5rem;font-size:0.95rem;"></div>
        <div class="progress-track">
          <div class="progress-fill" id="progress"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:0.78rem;color:var(--text-muted);margin-bottom:0.75rem;">
          <span id="current-time">0:00</span>
          <span id="total-time">0:00</span>
        </div>
        <div style="display:flex;gap:0.75rem;">
          <button onclick="togglePause()" id="pause-btn" class="pause-btn">⏸ Pause</button>
          <button onclick="stopMusic()" class="stop-btn">⏹ Stop</button>
        </div>
      </div>

    </div>
  </div>

  <audio id="player" class="hidden"></audio>

  <nav class="bottom-nav">
    <a href="/mood.html" class="bottom-nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
    <a href="/journal.html" class="bottom-nav-item"><span class="nav-icon">📔</span><span>Journal</span></a>
    <a href="/dashboard.html" class="bottom-nav-item"><span class="nav-icon">📊</span><span>Stats</span></a>
    <a href="/streak.html" class="bottom-nav-item"><span class="nav-icon">🔥</span><span>Streak</span></a>
  </nav>

  <script>
    let currentBtn = null;
    let currentCardIndex = null;
    let isPaused = false;
    const player = document.getElementById('player');
    const playerContainer = document.getElementById('player-container');
    const nowPlaying = document.getElementById('now-playing');
    const progressBar = document.getElementById('progress');
    const currentTimeEl = document.getElementById('current-time');
    const totalTimeEl = document.getElementById('total-time');
    const pauseBtn = document.getElementById('pause-btn');

    function formatTime(seconds) {
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60);
      return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    function playMusic(btn, src, title, cardIndex) {
      if (currentBtn && currentBtn !== btn) {
        currentBtn.textContent = "▶";
        if (currentCardIndex !== null) document.getElementById(`card-${currentCardIndex}`).classList.remove('playing');
      }
      player.pause();
      player.src = src;
      player.currentTime = 0;
      player.play();

      btn.textContent = "⏸";
      document.getElementById(`card-${cardIndex}`).classList.add('playing');

      playerContainer.classList.remove('hidden');
      nowPlaying.innerHTML = `🎧 ${title}`;

      currentBtn = btn;
      currentCardIndex = cardIndex;
      isPaused = false;
      pauseBtn.textContent = "⏸ Pause";

      player.ontimeupdate = () => {
        if (player.duration) {
          const progress = (player.currentTime / player.duration) * 100;
          progressBar.style.width = `${progress}%`;
          currentTimeEl.textContent = formatTime(player.currentTime);
          totalTimeEl.textContent = formatTime(player.duration);
        }
      };
      player.onended = () => resetPlayer();
    }

    function togglePause() {
      if (!player.src) return;
      if (isPaused) {
        player.play();
        pauseBtn.textContent = "⏸ Pause";
        if (currentBtn) currentBtn.textContent = "⏸";
        isPaused = false;
      } else {
        player.pause();
        pauseBtn.textContent = "▶ Resume";
        if (currentBtn) currentBtn.textContent = "▶";
        isPaused = true;
      }
    }

    function stopMusic() {
      player.pause();
      player.currentTime = 0;
      resetPlayer();
    }

    function resetPlayer() {
      if (currentBtn) currentBtn.textContent = "▶";
      if (currentCardIndex !== null) document.getElementById(`card-${currentCardIndex}`).classList.remove('playing');
      playerContainer.classList.add('hidden');
      currentBtn = null;
      currentCardIndex = null;
      isPaused = false;
    }

    player.onpause = () => { if (!isPaused) resetPlayer(); };
  </script>
</body>
</html>
