<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angry - Mood Helper</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #f9e8d8 0%, #f0d0b8 50%, #e8b4a0 100%);
      position: relative;
      overflow: hidden;
    }
    .illustration {
      position: absolute;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
      animation: float 28s infinite linear;
    }
    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-25px) rotate(5deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }
  </style>
</head>
<body class="min-h-screen">

  <div class="illustration text-7xl" style="top: 20%; left: 10%;">🍂</div>
  <div class="illustration text-6xl" style="top: 45%; right: 15%; animation-delay: -10s;">🌿</div>

  <div class="max-w-md mx-auto pt-12 px-6 relative z-10">
    <h1 class="text-4xl font-bold text-[#8c4a3a] text-center">You're feeling Angry</h1>
    <p class="text-center text-[#a87a6a] mt-3">It's okay. Let's gently work with this feeling.</p>

    <div class="mt-10 space-y-4">
      <button onclick="goTo('/meditation-angry.html')" class="w-full py-6 bg-[#e8b4a0] hover:bg-[#d9a38f] text-white font-medium rounded-3xl text-lg shadow">🧘 Meditation for Angry</button>
      <button onclick="goTo('/music-angry.html')" class="w-full py-6 bg-[#e8b4a0] hover:bg-[#d9a38f] text-white font-medium rounded-3xl text-lg shadow">🎵 Play Music for Angry</button>
      <button onclick="goTo('/workout-angry.html')" class="w-full py-6 bg-[#e8b4a0] hover:bg-[#d9a38f] text-white font-medium rounded-3xl text-lg shadow">🏃 Workout Video for Angry</button>
    </div>

    <div class="mt-12 bg-white rounded-3xl shadow p-6">
      <p class="text-center text-[#5d4a3f] font-medium mb-4">Would you like to save this moment?</p>
      <input id="note-input" type="text" placeholder="e.g. exam stress today" 
             class="w-full px-5 py-4 bg-[#f9e8d8] border border-[#e8d9c8] rounded-2xl focus:outline-none text-gray-700 mb-4">
      <button onclick="saveToJournal()" class="w-full py-4 bg-[#d4b89e] hover:bg-[#c9a98f] text-white font-medium rounded-2xl transition">
        💾 Save to Mood Journal
      </button>
    </div>

    <!-- Back Button -->
    <div class="text-center mt-12">
      <a href="/mood.html" class="inline-flex items-center gap-2 text-[#a87a6a] hover:text-[#8c4a3a] font-medium">
        ← Back to Mood Detection
      </a>
    </div>
  </div>

  <script>
    function goTo(page) { window.location.href = page; }
    function saveToJournal() {
      const note = document.getElementById('note-input').value.trim() || "";
      const mood = "Angry";
      const entry = { date: new Date().toISOString().split('T')[0], mood: mood, note: note, tag: "" };
      let journal = JSON.parse(localStorage.getItem('moodJournal')) || [];
      journal.unshift(entry);
      localStorage.setItem('moodJournal', JSON.stringify(journal));
      alert("✅ Saved to Mood Journal!");
      document.getElementById('note-input').value = "";
    }
  </script>
</body>
</html>
