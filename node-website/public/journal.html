<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Mood Journal • Mood Helper</title>
  <link rel="stylesheet" href="/shared.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    .page-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .streak-card {
      background: linear-gradient(135deg, var(--primary), var(--primary-end));
      border-radius: 24px;
      padding: 2rem;
      text-align: center;
      color: #fff;
      margin-bottom: 1.25rem;
    }
    .streak-number {
      font-size: 4rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.05em;
    }
    .entry-item {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }
    .entry-item:last-child { border-bottom: none; }
  </style>
</head>
<body class="with-bottom-nav">

  <!-- Header -->
  <div class="page-header">
    <div style="display:flex;align-items:center;gap:1rem;">
      <a href="/mood.html" class="back-btn">Back</a>
      <h1 style="font-size:1.2rem;font-weight:800;color:var(--text);">My Journal</h1>
    </div>
  </div>

  <div class="page-content" style="padding:1.5rem 0 4rem;">
    <div class="container-sm">

      <!-- Streak Card -->
      <div class="streak-card fade-up">
        <div style="font-size:0.85rem;font-weight:600;opacity:0.8;margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.08em;">Current Streak</div>
        <div class="streak-number"><span id="streak">0</span> 🔥</div>
        <div id="motivation" style="margin-top:0.75rem;font-size:0.95rem;opacity:0.9;font-weight:500;"></div>
      </div>

      <!-- Insight Card -->
      <div class="card fade-up-1" style="margin-bottom:1.25rem;background:linear-gradient(135deg,rgba(124,58,237,0.06),rgba(168,85,247,0.06));border-color:rgba(124,58,237,0.2);">
        <div id="insight" style="text-align:center;color:var(--text-soft);line-height:1.6;font-size:0.95rem;font-weight:500;"></div>
      </div>

      <!-- Chart Card -->
      <div class="card fade-up-2" style="margin-bottom:1.25rem;">
        <h3 style="font-weight:700;font-size:1rem;margin-bottom:1rem;">Mood Trend (Last 7 Days)</h3>
        <canvas id="moodChart" height="160"></canvas>
      </div>

      <!-- Action Buttons -->
      <div style="display:flex;flex-direction:column;gap:0.75rem;margin-bottom:1.5rem;" class="fade-up-3">
        <button onclick="showEmergency()" class="btn btn-block btn-lg" style="background:rgba(239,68,68,0.1);color:#DC2626;border:1.5px solid rgba(239,68,68,0.25);border-radius:16px;">
          🚨 I Need Help Right Now
        </button>
        <button onclick="exportJournal()" class="btn btn-primary btn-block btn-lg" style="border-radius:16px;">
          📥 Export Journal as CSV
        </button>
        <button onclick="clearAllJournal()" class="btn btn-surface btn-block" style="border-radius:16px;font-size:0.88rem;color:#DC2626;border-color:rgba(239,68,68,0.2);">
          🗑️ Clear All Journal
        </button>
      </div>

      <!-- Entries -->
      <h2 style="font-size:1.1rem;font-weight:800;color:var(--text);margin-bottom:1rem;" class="fade-up-4">Recent Entries</h2>
      <div class="card fade-up-5" style="padding:0;overflow:hidden;">
        <div id="entries"></div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="/mood.html" class="bottom-nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
    <a href="/journal.html" class="bottom-nav-item active"><span class="nav-icon">📔</span><span>Journal</span></a>
    <a href="/dashboard.html" class="bottom-nav-item"><span class="nav-icon">📊</span><span>Stats</span></a>
    <a href="/streak.html" class="bottom-nav-item"><span class="nav-icon">🔥</span><span>Streak</span></a>
  </nav>

  <script>
    let journal = JSON.parse(localStorage.getItem('moodJournal')) || [];

    function getMoodScore(mood) {
      if (mood === "Happy") return 4;
      if (mood === "Calm") return 3.5;
      if (mood === "Sad") return 2;
      if (mood === "Angry") return 1;
      return 2.5;
    }

    function renderChart() {
      const ctx = document.getElementById('moodChart');
      const labels = [];
      const dataPoints = [];
      const today = new Date();

      for (let i = 6; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        labels.push(d.toLocaleDateString('en-US', { weekday: 'short' }));
        const dayEntry = journal.find(e => e.date === d.toISOString().split('T')[0]);
        dataPoints.push(dayEntry ? getMoodScore(dayEntry.mood) : null);
      }

      new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Mood Level',
            data: dataPoints,
            borderColor: '#7C3AED',
            backgroundColor: 'rgba(124,58,237,0.08)',
            tension: 0.4,
            borderWidth: 3,
            pointRadius: 5,
            pointBackgroundColor: '#A855F7'
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { min: 0, max: 4.5, ticks: { stepSize: 1 } } }
        }
      });
    }

    function showInsight() {
      const insightEl = document.getElementById('insight');
      if (journal.length < 4) {
        insightEl.innerHTML = "Keep checking your mood daily.<br>Patterns will appear soon and help you understand yourself better 🌱";
        return;
      }
      const happyCalm = journal.filter(e => e.mood === "Happy" || e.mood === "Calm").length;
      const total = journal.length;
      const percentage = Math.round((happyCalm / total) * 100);
      if (percentage > 60) {
        insightEl.innerHTML = `You've had <strong>${percentage}%</strong> positive days recently.<br>You're building emotional resilience well!`;
      } else if (percentage < 30) {
        insightEl.innerHTML = `You've had more challenging days lately.<br>It's brave to notice this. Small daily practices can help.`;
      } else {
        insightEl.innerHTML = `Your moods are quite balanced.<br>You're doing a good job noticing and caring for your emotions.`;
      }
    }

    function updateStreak() {
      const streakEl = document.getElementById('streak');
      const motivationEl = document.getElementById('motivation');
      if (journal.length === 0) {
        streakEl.textContent = "0";
        motivationEl.textContent = "Start today — every check-in matters 🌱";
        return;
      }
      let streak = 1;
      let currentDate = new Date();
      currentDate.setDate(currentDate.getDate() - 1);
      for (let i = 1; i < journal.length; i++) {
        const entryDate = new Date(journal[i].date);
        if (entryDate.toISOString().split('T')[0] === currentDate.toISOString().split('T')[0]) {
          streak++;
          currentDate.setDate(currentDate.getDate() - 1);
        } else {
          break;
        }
      }
      streakEl.textContent = streak;
      if (streak >= 7) {
        motivationEl.innerHTML = `${streak} days in a row 🔥 Amazing consistency!`;
      } else if (streak >= 3) {
        motivationEl.innerHTML = `${streak} days in a row — building a wonderful habit!`;
      } else {
        motivationEl.textContent = "Every check-in is a step toward better self-awareness 🌱";
      }
    }

    function getMoodBadgeClass(mood) {
      if (mood === "Happy") return "badge-happy";
      if (mood === "Calm")  return "badge-calm";
      if (mood === "Sad")   return "badge-sad";
      if (mood === "Angry") return "badge-angry";
      return "badge-primary";
    }

    function renderEntries() {
      const container = document.getElementById('entries');
      container.innerHTML = '';
      if (journal.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:2.5rem 1rem;">No entries yet.<br>Detect your mood and save to journal.</p>';
        return;
      }
      journal.forEach((entry) => {
        const div = document.createElement('div');
        div.className = 'entry-item';
        div.innerHTML = `
          <div>
            <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:0.25rem;">${entry.date || entry.datetime || ''}</div>
            ${entry.note ? `<p style="color:var(--text);font-size:0.9rem;margin-top:0.2rem;">${entry.note}</p>` : ''}
          </div>
          <span class="badge ${getMoodBadgeClass(entry.mood)}">${entry.mood}</span>
        `;
        container.appendChild(div);
      });
    }

    function clearAllJournal() {
      if (confirm("Delete ALL journal entries? This cannot be undone.")) {
        localStorage.removeItem('moodJournal');
        journal = [];
        renderEntries();
        showInsight();
        updateStreak();
        showToast("Journal cleared.");
      }
    }

    function exportJournal() {
      if (journal.length === 0) { showToast("No entries to export yet."); return; }
      let csv = "Date,Mood,Note\n";
      journal.forEach(entry => {
        csv += `"${entry.date}","${entry.mood}","${(entry.note || "").replace(/"/g, '""')}"\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Mood_Journal_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      showToast("✅ Journal exported!");
    }

    function showToast(msg) {
      let t = document.getElementById('_toast');
      if (!t) {
        t = document.createElement('div');
        t.id = '_toast';
        t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#2d4a3e;color:#fff;padding:0.7rem 1.4rem;border-radius:99px;font-weight:700;font-size:0.9rem;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;';
        document.body.appendChild(t);
      }
      t.textContent = msg; t.style.opacity = '1';
      clearTimeout(t._t); t._t = setTimeout(() => { t.style.opacity = '0'; }, 2500);
    }

    function showEmergency() {
      const html = `
        <div class="onboard-overlay" onclick="this.remove()" style="z-index:300;">
          <div class="onboard-sheet" onclick="event.stopPropagation()">
            <h2 style="font-size:1.4rem;font-weight:900;color:#DC2626;text-align:center;margin-bottom:0.5rem;">You are not alone 💙</h2>
            <p style="text-align:center;color:var(--text-soft);font-size:0.9rem;margin-bottom:1.5rem;">Please reach out for immediate support.</p>
            <a href="tel:23892222" style="display:block;padding:1rem 1.25rem;background:rgba(239,68,68,0.08);border:1.5px solid rgba(239,68,68,0.2);border-radius:16px;margin-bottom:0.75rem;color:#DC2626;font-weight:600;text-decoration:none;">
              Samaritan Befrienders Hong Kong<br><span style="font-size:0.8rem;font-weight:400;color:#B91C1C;">2389 2222 (24 hours)</span>
            </a>
            <a href="tel:28960000" style="display:block;padding:1rem 1.25rem;background:rgba(239,68,68,0.08);border:1.5px solid rgba(239,68,68,0.2);border-radius:16px;margin-bottom:0.75rem;color:#DC2626;font-weight:600;text-decoration:none;">
              Youthline<br><span style="font-size:0.8rem;font-weight:400;color:#B91C1C;">2896 0000</span>
            </a>
            <button onclick="this.closest('.onboard-overlay').remove()" class="btn btn-surface btn-block btn-lg" style="margin-top:0.5rem;border-radius:16px;">Close</button>
          </div>
        </div>
      `;
      document.body.insertAdjacentHTML('beforeend', html);
    }

    renderEntries();
    showInsight();
    renderChart();
    updateStreak();
  </script>
</body>
</html>
