<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Mood Journal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #f9f5eb 0%, #f0e9e0 50%, #e8f0e8 100%);
      position: relative;
      overflow: hidden;
    }
    .illustration {
      position: absolute;
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
      animation: float 35s infinite linear;
    }
    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(6deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- Gentle floating illustrations -->
  <div class="illustration text-8xl" style="top: 10%; left: 8%;">🌿</div>
  <div class="illustration text-7xl" style="top: 35%; right: 15%; animation-delay: -15s;">🌸</div>
  <div class="illustration text-6xl" style="bottom: 25%; left: 20%; animation-delay: -22s;">🍃</div>

  <div class="max-w-2xl mx-auto pt-12 px-6 relative z-10">
    <!-- Back Button -->
    <div class="flex items-center justify-between mb-8">
      <a href="/mood.html" class="flex items-center gap-2 text-[#8c7a6b] hover:text-[#5d4a3f] font-medium">
        ← Back to Mood Detection
      </a>
      <h1 class="text-4xl font-bold text-[#5d4a3f]">My Mood Journal</h1>
    </div>

    <!-- Daily Streak -->
    <div class="bg-white rounded-3xl shadow-xl p-8 mb-10 text-center">
      <p class="text-sm text-gray-500">Current Streak</p>
      <p id="streak" class="text-6xl font-bold text-emerald-600 mt-2">0</p>
      <p id="motivation" class="text-[#5d4a3f] mt-3 font-medium"></p>
    </div>

    <!-- Chart -->
    <div class="bg-white rounded-3xl shadow-xl p-8 mb-10">
      <h3 class="text-lg font-semibold text-gray-700 mb-4">Mood Trend (Last 7 Days)</h3>
      <canvas id="moodChart" height="150"></canvas>
    </div>

    <!-- Insight -->
    <div id="insight" class="bg-emerald-50 border border-emerald-200 rounded-3xl p-7 mb-10 text-center text-emerald-700 font-medium leading-relaxed"></div>

    <!-- Emergency Button -->
    <button onclick="showEmergency()" 
            class="w-full py-5 bg-red-100 hover:bg-red-200 text-red-700 font-medium rounded-3xl text-lg shadow mb-10 flex items-center justify-center gap-3">
      🚨 I Need Help Right Now
    </button>

    <!-- Export Button -->
    <button onclick="exportJournal()" 
            class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-3xl text-lg shadow mb-10">
      📥 Export Journal as CSV
    </button>

    <!-- Clear All -->
    <div class="flex justify-end mb-8">
      <button onclick="clearAllJournal()" 
              class="px-8 py-3 bg-red-100 hover:bg-red-200 text-red-700 rounded-2xl text-sm font-medium transition">
        🗑️ Clear All Journal
      </button>
    </div>

    <!-- Entries -->
    <h2 class="text-2xl font-semibold mb-6 text-[#5d4a3f]">Recent Entries</h2>
    <div id="entries" class="space-y-5"></div>

  </div>

  <script>
    let journal = JSON.parse(localStorage.getItem('moodJournal')) || [];

    function getMoodScore(mood) {
      if (mood === "Happy") return 4;
      if (mood === "Calm") return 3.5;
      if (mood === "Sad") return 2;
      if (mood === "Angry") return 1;
      return 2.5;
    }

    function renderChart() {
      const ctx = document.getElementById('moodChart');
      const labels = [];
      const dataPoints = [];
      const today = new Date();

      for (let i = 6; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        labels.push(d.toLocaleDateString('en-US', { weekday: 'short' }));

        const dayEntry = journal.find(e => e.date === d.toISOString().split('T')[0]);
        dataPoints.push(dayEntry ? getMoodScore(dayEntry.mood) : null);
      }

      new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Mood Level',
            data: dataPoints,
            borderColor: '#8fb8a8',
            backgroundColor: 'rgba(143, 184, 168, 0.15)',
            tension: 0.4,
            borderWidth: 3,
            pointRadius: 5
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { min: 0, max: 4.5, ticks: { stepSize: 1 } } }
        }
      });
    }

    function showInsight() {
      const insightEl = document.getElementById('insight');
      if (journal.length < 4) {
        insightEl.innerHTML = "Keep checking your mood daily.<br>Patterns will appear soon and help you understand yourself better 🌱";
        return;
      }

      const happyCalm = journal.filter(e => e.mood === "Happy" || e.mood === "Calm").length;
      const total = journal.length;
      const percentage = Math.round((happyCalm / total) * 100);

      if (percentage > 60) {
        insightEl.innerHTML = `You've had <strong>${percentage}%</strong> positive days recently.<br>You're building emotional resilience well!`;
      } else if (percentage < 30) {
        insightEl.innerHTML = `You've had more challenging days lately.<br>It's brave to notice this. Small daily practices can help.`;
      } else {
        insightEl.innerHTML = `Your moods are quite balanced.<br>You're doing a good job noticing and caring for your emotions.`;
      }
    }

    function updateStreak() {
      const streakEl = document.getElementById('streak');
      const motivationEl = document.getElementById('motivation');

      if (journal.length === 0) {
        streakEl.textContent = "0";
        motivationEl.textContent = "Start today — every check-in matters 🌱";
        return;
      }

      let streak = 1;
      let currentDate = new Date();
      currentDate.setDate(currentDate.getDate() - 1);

      for (let i = 1; i < journal.length; i++) {
        const entryDate = new Date(journal[i].date);
        if (entryDate.toISOString().split('T')[0] === currentDate.toISOString().split('T')[0]) {
          streak++;
          currentDate.setDate(currentDate.getDate() - 1);
        } else {
          break;
        }
      }

      streakEl.textContent = streak;

      if (streak >= 7) {
        motivationEl.innerHTML = `You've checked your mood for <strong>${streak} days in a row</strong> 🔥<br>Amazing consistency!`;
      } else if (streak >= 3) {
        motivationEl.innerHTML = `You've checked your mood for <strong>${streak} days in a row</strong>.<br>You're building a wonderful habit!`;
      } else {
        motivationEl.innerHTML = "Every check-in is a step toward better self-awareness 🌱";
      }
    }

    function renderEntries() {
      const container = document.getElementById('entries');
      container.innerHTML = '';

      if (journal.length === 0) {
        container.innerHTML = `<p class="text-center text-gray-500 py-16">No entries yet.<br>Detect your mood and save to journal.</p>`;
        return;
      }

      journal.forEach((entry) => {
        const div = document.createElement('div');
        div.className = "bg-white rounded-3xl p-7 shadow border border-[#e8d9c8]";
        div.innerHTML = `
          <div class="flex justify-between items-center">
            <div class="text-sm text-gray-500">${entry.date}</div>
            <span class="px-5 py-1 text-sm font-medium rounded-full ${getMoodColor(entry.mood)}">${entry.mood}</span>
          </div>
          ${entry.note ? `<p class="mt-5 text-gray-700">${entry.note}</p>` : ''}
        `;
        container.appendChild(div);
      });
    }

    function getMoodColor(mood) {
      if (mood === "Happy") return "bg-[#f5d9b0] text-[#8c6f3a]";
      if (mood === "Calm") return "bg-[#b8d0c0] text-[#4a6b5a]";
      if (mood === "Sad") return "bg-[#a8b8d0] text-[#4a5c7a]";
      if (mood === "Angry") return "bg-[#e8b4a0] text-[#8c4a3a]";
      return "bg-gray-100 text-gray-700";
    }

    function clearAllJournal() {
      if (confirm("Delete ALL journal entries? This cannot be undone.")) {
        localStorage.removeItem('moodJournal');
        journal = [];
        renderEntries();
        showInsight();
        updateStreak();
        alert("Journal cleared.");
      }
    }

    function exportJournal() {
      if (journal.length === 0) {
        alert("No entries to export.");
        return;
      }

      let csv = "Date,Mood,Note\n";
      journal.forEach(entry => {
        csv += `"${entry.date}","${entry.mood}","${(entry.note || "").replace(/"/g, '""')}"\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Mood_Journal_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      URL.revokeObjectURL(url);

      alert("Journal exported successfully!");
    }

    function showEmergency() {
      const html = `
        <div class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
          <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center">
            <h2 class="text-2xl font-bold text-red-600 mb-4">You are not alone</h2>
            <p class="text-gray-700 mb-8">Please reach out if you need immediate support.</p>
            
            <div class="space-y-4 text-left">
              <a href="tel:23892222" class="block p-5 bg-red-50 hover:bg-red-100 rounded-2xl text-red-700 font-medium">
                Samaritan Befrienders Hong Kong<br><span class="text-sm">2389 2222 (24 hours)</span>
              </a>
              <a href="tel:28960000" class="block p-5 bg-red-50 hover:bg-red-100 rounded-2xl text-red-700 font-medium">
                Youthline<br><span class="text-sm">2896 0000</span>
              </a>
            </div>

            <button onclick="this.closest('.fixed').remove()" 
                    class="mt-8 w-full py-4 bg-gray-200 hover:bg-gray-300 rounded-2xl font-medium">
              Close
            </button>
          </div>
        </div>
      `;

      const div = document.createElement('div');
      div.innerHTML = html;
      document.body.appendChild(div.firstElementChild);
    }

    // Initialize
    renderEntries();
    showInsight();
    renderChart();
    updateStreak();
  </script>
</body>
</html>
