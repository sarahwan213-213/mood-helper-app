<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mood History Calendar • Mood Helper</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f4f0; }
    .day { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 9999px; font-size: 0.9rem; }
  </style>
</head>
<body class="bg-[#f8f4f0] min-h-screen">

  <div class="max-w-4xl mx-auto px-6 py-12">
    <a href="/mood.html" class="inline-flex items-center gap-2 text-[#6b8c7a] hover:text-[#5a7a68] mb-8">
      ← Back to Home
    </a>
    <h1 class="text-4xl font-semibold text-[#5d4a3f] mb-2">Mood History Calendar</h1>
    <p class="text-[#6b5c4f] mb-10">March 2026 • Click any day to see your note</p>

    <div id="calendar" class="bg-white rounded-3xl shadow-xl p-8 grid grid-cols-7 gap-2 text-center"></div>
  </div>

  <script>
    const moodColor = { Angry: '#d4b8a8', Sad: '#b8c8d4', Happy: '#f0d4b0', Calm: '#b0c8b8' };
    const journal = JSON.parse(localStorage.getItem('moodJournal')) || [];

    function renderCalendar() {
      const container = document.getElementById('calendar');
      container.innerHTML = `
        <div class="text-[#6b5c4f] font-medium">Sun</div><div class="text-[#6b5c4f] font-medium">Mon</div>
        <div class="text-[#6b5c4f] font-medium">Tue</div><div class="text-[#6b5c4f] font-medium">Wed</div>
        <div class="text-[#6b5c4f] font-medium">Thu</div><div class="text-[#6b5c4f] font-medium">Fri</div>
        <div class="text-[#6b5c4f] font-medium">Sat</div>
      `;

      // Simple March 2026 demo (you can change the month later)
      for (let i = 1; i <= 31; i++) {
        const dateStr = `2026-03-${i.toString().padStart(2, '0')}`;
        const entry = journal.find(e => e.date === dateStr);
        const color = entry ? moodColor[entry.mood] : '#f0ede5';
        const div = document.createElement('div');
        div.className = `day`;
        div.style.backgroundColor = color;
        div.style.color = entry ? '#fff' : '#6b5c4f';
        div.textContent = i;
        if (entry) {
          div.title = `${entry.mood} - ${entry.note || ''}`;
          div.onclick = () => alert(`Date: ${dateStr}\nMood: ${entry.mood}\nNote: ${entry.note || 'No note'}`);
        }
        container.appendChild(div);
      }
    }

    renderCalendar();
  </script>
</body>
</html>
